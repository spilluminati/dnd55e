title: "Class Request: "
body:
  - type: markdown
    attributes:
      value: |
        # Important
        * Search existing discussions before posting, including closed ones — duplicate requests may be closed.
        * One request = one class or subclass. Please don't bundle multiple unrelated requests in a single post.
        * This category is for classes, subclasses, or class features that are **missing** or **not yet implemented** in the mod. If something already exists but behaves incorrectly, please open a Bug Report issue instead.
        * Include the official source so the class/subclass can be verified against the rules text.

  - type: dropdown
    id: request-type
    attributes:
      label: What are you requesting?
      options:
        - New subclass for an existing class
        - New base class
        - Class feature or update to an existing class/subclass
        - Not sure
    validations:
      required: true

  - type: input
    id: class-name
    attributes:
      label: Class name
      description: The base class this applies to (e.g. Ranger, Wizard). If requesting a new base class, name it here.
      placeholder: e.g. Ranger
    validations:
      required: true

  - type: input
    id: subclass-name
    attributes:
      label: Subclass name
      description: Leave blank if this isn't about a specific subclass.
      placeholder: e.g. Fey Wanderer
    validations:
      required: false

  - type: input
    id: dndbeyond-link
    attributes:
      label: D&D Beyond link
      description: Link to the class or subclass's D&D Beyond page, if available.
      placeholder: e.g. https://www.dndbeyond.com/classes/2190875-barbarian#PathoftheBerserker
    validations:
      required: false

  - type: input
    id: source
    attributes:
      label: Source book
      description: Where does this class/subclass/feature come from? (e.g. PHB 2024, Xanathar's Guide, Tasha's Cauldron, Fizban's Treasury)
      placeholder: e.g. Tasha's Cauldron of Everything
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Why do you think this should be added?
      description: Explain the gap this fills (e.g. iconic subclass missing from the current lineup, popular build enabler, etc.).
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing discussions and this hasn't already been requested.
          required: true
        - label: I confirmed this isn't already implemented in the current mod version.
          required: true
